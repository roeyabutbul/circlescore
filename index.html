<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CircleScore</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>

<div class="app">
  <div class="header">
    <h1>CircleScore</h1>
    <p>Predict how well a group will vibe together</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="predict" onclick="switchTab('predict')">Predict</button>
    <button class="tab-btn" data-tab="scores" onclick="switchTab('scores')">Pair Scores</button>
    <button class="tab-btn" data-tab="friends" onclick="switchTab('friends')">Friends</button>
  </div>

  <!-- PREDICT PANEL -->
  <div class="panel active" id="panel-predict">
    <div class="card arena-card">
      <div class="bubble-arena" id="bubble-arena">
        <button class="arena-reset-btn" onclick="resetSelection()" title="Reset selection">↺</button>
        <svg class="arena-lines" id="arena-lines"></svg>
        <div class="arena-center" id="arena-center">
          <div class="score-number empty" id="score-number">—</div>
          <div class="score-label" id="score-label"></div>
        </div>
      </div>
      <p class="selected-summary" id="selected-summary">Tap people to predict a group score</p>
      <div class="breakdown" id="score-breakdown"></div>
    </div>
  </div>

  <!-- PAIR SCORES PANEL -->
  <div class="panel" id="panel-scores">
    <div class="card">
      <div class="section-title">Set pairwise closeness scores (1–10)</div>
      <p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:16px;">
        Rate how well each pair of friends gets along. These are the base scores before any meetings are logged.
      </p>
      <div id="pairs-container"></div>
    </div>
  </div>

  <!-- FRIENDS PANEL -->
  <div class="panel" id="panel-friends">
    <div class="card">
      <div class="section-title">Your friend group</div>
      <div id="friends-list"></div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="Add a friend..." maxlength="30" />
        <button class="btn btn-primary" onclick="addPerson()">Add</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<script src="static/app.js"></script>
</body>
</html>
